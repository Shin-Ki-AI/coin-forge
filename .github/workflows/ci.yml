name: CI

# 코드를 push/PR 할 때마다 자동으로 lint·타입체크·테스트를 실행한다.
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (dev + api extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      # 테스트가 차단 게이트. 하나라도 실패하면 CI 실패.
      - name: Test (pytest)
        run: pytest -q

      # 아래 둘은 기존 lint 부채가 정리될 때까지 정보성(실패해도 CI는 통과).
      # 부채 정리 후 continue-on-error 를 제거해 차단 게이트로 승격할 것.
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy coinforge
