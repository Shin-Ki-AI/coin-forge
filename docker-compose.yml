services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    command: ["python", "-m", "coinforge.cli.trader"]

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    command: ["python", "-m", "coinforge.cli.api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

volumes:
  mongo_data:
